name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - run: uv sync

      - name: Ruff lint
        run: uv run ruff check .
        continue-on-error: true

      - name: Ruff format check
        run: uv run ruff format --check .
        continue-on-error: true

      - name: Run tests
        run: uv run pytest
        continue-on-error: true

exchange:
  name: "binance"
  ws_url: "wss://stream.binance.com:9443/ws"
  api_key: ""
  api_secret: ""

roostoo:
  base_url: "https://mock-api.roostoo.com"
  api_key: ""       # env var override: ROOSTOO_API_KEY
  api_secret: ""    # env var override: ROOSTOO_API_SECRET
  seed_trade_min_position_notional_usd: 1.0

data:
  buffer_size: 1500         # sliding window length (candles) — need 240×5=1200 raw 1-min candles min
  candle_interval: "1m"     # 1-minute candles
  tick_buffer_size: 5000    # raw tick buffer

features:
  rsi_period: 14
  ema_fast: 12
  ema_slow: 26
  atr_period: 14
  volatility_window: 20
  momentum_window: 10

alpha:
  engine: "rule_based"      # optional overlay engine: "rule_based" | "lstm" | "ensemble"
  entry_threshold: 0.6
  exit_threshold: -0.2
  model_path: "artifacts/model.onnx"
  seq_len: 240              # model lookback window (240 × 5min = 20h)
  resample_minutes: 5       # gate alpha on N-min bar completion
  multi_timeframes: [15, 60]  # higher-TF filters (15m EMA crossover, 1h momentum)
  decay_half_life_s: 999999   # alpha signal decay half-life (set 150 to enable)
  icir_prior_path: "artifacts/icir_priors.json"
  icir_window: 100          # rolling IC window
  icir_min_samples: 30      # samples before trusting online data
  icir_min_lambda: 0.3      # floor shrinkage (always keep 30% prior)
  icir_tau: 50.0            # decay rate for lambda

strategy:
  profile: "regime_trend_v1"
  max_positions_per_symbol: 1
  use_model_overlay: false  # when true, alpha engine is only a filter/size overlay
  position_size_pct: 0.10   # fallback if Kelly is disabled
  base_size_pct: 0.05       # Half-Kelly floor
  max_size_pct: 0.15        # Half-Kelly ceiling
  kelly_fraction: 0.5       # half-Kelly multiplier
  estimated_win_rate: 0.55  # prior — calibrate from backtest results
  estimated_payoff: 1.5     # avg_win / avg_loss — calibrate from backtest results
  urgent_alpha_threshold: 0.85  # alpha above this → market order
  confirmation_bars: 2      # require N consecutive bars above threshold
  adaptive_kelly: false     # enable adaptive Kelly sizing from trade history
  kelly_window: 50          # rolling window for adaptive Kelly
  kelly_min_trades: 10      # min trades before blending with priors
  exit_tiers: []            # graduated exits, e.g. [{threshold: -0.1, sell_pct: 0.5}, {threshold: -0.3, sell_pct: 1.0}]
  min_entry_score: 0.62
  max_blocker_score: 0.35
  min_exit_score: 0.55
  min_supporting_factors: 2
  min_supporting_categories: 2
  require_trend_alignment: true
  urgent_entry_score: 0.82
  signal_horizon_minutes: 240
  exit_horizon_minutes: 30
  base_stop_loss_pct: 0.012
  take_profit_1_rr: 1.2
  take_profit_2_rr: 2.0
  model_filter_threshold: 0.05
  model_exit_threshold: -0.10
  model_size_weight: 0.15
  neutral_entry_size_multiplier: 0.50
  risk_off_entry_size_multiplier: 0.00
  min_volatility_size_multiplier: 0.35
  min_volume_ratio: 1.10
  min_order_book_imbalance: 1.02
  max_funding_rate: 0.0005
  max_taker_ratio: 1.20
  max_open_interest_change: 0.03
  max_volatility: 0.025
  factor_weights:
    market_regime: 0.20
    trend_alignment: 0.24
    momentum_impulse: 0.18
    breakout_confirmation: 0.12
    volume_confirmation: 0.14
    liquidity_balance: 0.08
    perp_crowding: 0.14
    volatility_regime: 0.10

regime:
  enabled: true
  benchmark_symbols: ["BTC/USDT", "ETH/USDT"]
  risk_on_threshold: 0.25
  neutral_threshold: 0.05
  breadth_min_symbols: 5
  volatility_ceiling: 0.020

trend:
  breakout_lookback: 20
  trend_slope_lookback: 20
  volume_zscore_window: 24
  breakout_min_distance: 0.10
  breakout_overheat_distance: 1.75
  min_trend_slope: 0.0005
  min_volume_zscore: -0.25
  vol_target_floor: 0.012

risk:
  max_portfolio_exposure: 0.45
  max_single_exposure: 0.12
  trailing_stop_pct: 0.03
  atr_stop_multiplier: 2.0
  daily_drawdown_limit: 0.05
  max_orders_per_minute: 20  # per-symbol rate limit (Binance allows 10/s but be conservative)

execution:
  default_order_type: "market"
  limit_offset_bps: 5
  order_timeout_seconds: 30
  fee_market_bps: 10        # 0.1% taker fee
  fee_limit_bps: 5          # 0.05% maker fee

paper:
  initial_capital: 1000000.0
  slippage_bps: 5
  fee_bps: 10
  replay_file: ""           # optional CSV for deterministic replay
  speed_multiplier: 60.0    # 60x = 1 hour per minute of wall time

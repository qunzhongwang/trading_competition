mode: "paper"  # "paper" | "live"

symbols:
  - "BTC/USDT"
  - "ETH/USDT"

exchange:
  name: "binance"
  ws_url: "wss://stream.binance.com:9443/ws"
  api_key: ""
  api_secret: ""

data:
  buffer_size: 500          # sliding window length (candles)
  candle_interval: "1m"     # 1-minute candles
  tick_buffer_size: 5000    # raw tick buffer

features:
  rsi_period: 14
  ema_fast: 12
  ema_slow: 26
  atr_period: 14
  volatility_window: 20
  momentum_window: 10

alpha:
  engine: "rule_based"      # "rule_based" | "lstm" | "ensemble"
  entry_threshold: 0.6
  exit_threshold: -0.2
  model_path: "artifacts/model.onnx"
  seq_len: 60               # LSTM lookback window

strategy:
  max_positions_per_symbol: 1
  position_size_pct: 0.10   # fallback if Kelly is disabled
  base_size_pct: 0.05       # Half-Kelly floor
  max_size_pct: 0.15        # Half-Kelly ceiling
  kelly_fraction: 0.5       # half-Kelly multiplier
  estimated_win_rate: 0.55  # prior — calibrate from backtest results
  estimated_payoff: 1.5     # avg_win / avg_loss — calibrate from backtest results
  urgent_alpha_threshold: 0.85  # alpha above this → market order

risk:
  max_portfolio_exposure: 0.50
  max_single_exposure: 0.15
  trailing_stop_pct: 0.03
  atr_stop_multiplier: 2.0
  daily_drawdown_limit: 0.05
  max_orders_per_minute: 20  # per-symbol rate limit (Binance allows 10/s but be conservative)

execution:
  default_order_type: "market"
  limit_offset_bps: 5
  order_timeout_seconds: 30
  fee_market_bps: 10        # 0.1% taker fee
  fee_limit_bps: 5          # 0.05% maker fee

paper:
  initial_capital: 100000.0
  slippage_bps: 5
  fee_bps: 10
  replay_file: ""           # optional CSV for deterministic replay
  speed_multiplier: 60.0    # 60x = 1 hour per minute of wall time
